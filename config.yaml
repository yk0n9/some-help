mixed-port: 7890
allow-lan: true
mode: rule
ipv6: false
log-level: info
external-controller: :9090

dns:
  enable: true
  nameserver:
    - 8.8.8.8
    - 114.114.114.114

proxy-providers:
  sub:
    type: http
    url: https://sub.xeton.dev/sub?target=clash&list=true&udp=true&url=订阅
    path: sub.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.google.com/
      interval: 600

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - Auto
    use:
      - sub

  - name: Auto
    type: fallback
    use:
      - sub

rule-providers:
  Lan:
    behavior: classical
    type: http
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Lan/Lan.yaml
    interval: 86400
    path: Lan.yaml

  Advertising:
    behavior: classical
    type: http
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Advertising/Advertising_Classical.yaml
    interval: 86400
    path: Advertising.yaml

  Proxy:
    behavior: classical
    type: http
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Proxy/Proxy_Classical.yaml
    interval: 86400
    path: Proxy.yaml

  SteamCN:
    behavior: classical
    type: http
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/SteamCN/SteamCN.yaml
    interval: 86400
    path: SteamCN.yaml

  China:
    behavior: classical
    type: http
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/China/China_Classical.yaml
    interval: 86400
    path: China.yaml

rules:
  # Lan
  - RULE-SET,Lan,DIRECT
  # Rule
  - RULE-SET,Advertising,REJECT
  - RULE-SET,Proxy,PROXY
  - RULE-SET,SteamCN,DIRECT
  - RULE-SET,China,DIRECT
  # China
  - GEOIP,CN,DIRECT
  # Final
  - MATCH,PROXY