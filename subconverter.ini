[custom]
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Lan/Lan.yaml
ruleset=REJECT,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Advertising/Advertising_Classical.yaml
ruleset=Proxy,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Proxy/Proxy_Classical.yaml
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml
ruleset=DIRECT,[]GEOIP,CN
ruleset=Proxy,[]FINAL

custom_proxy_group=Proxy`select`[]FallBack`[]UrlTest`[]HK`[]TW`[]JP`[]SG`.*
custom_proxy_group=FallBack`fallback`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=UrlTest`url-test`.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=HK`fallback`(香港|HK|Hong Kong|🇭🇰)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=TW`fallback`(台湾|台北|TW|Taiwan|🇹🇼)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=JP`fallback`(日本|东京|大阪|JP|Japan|🇯🇵)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=SG`fallback`(新加坡|狮城|SG|Singapore|🇸🇬)`http://www.gstatic.com/generate_204`300,,50

enable_rule_generator=true
overwrite_original_rules=true
