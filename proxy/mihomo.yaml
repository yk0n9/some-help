mode: rule
mixed-port: 7890
allow-lan: true
log-level: debug
ipv6: false
external-controller: 0.0.0.0:9090
tcp-concurrent: true
unified-delay: true

tun:
  enable: true
  stack: gvisor
  device: mihomo0
  auto-route: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - Auto
      - HK
      - TW
      - JP
      - SG
    include-all-providers: true

  - name: Auto
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all-providers: true

  - name: HK
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    filter: 香港|HK|Hong Kong|🇭🇰
    include-all-providers: true

  - name: TW
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    filter: 台湾|台北|TW|Taiwan|🇹🇼
    include-all-providers: true

  - name: JP
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    filter: 日本|东京|大阪|JP|Japan|🇯🇵
    include-all-providers: true

  - name: SG
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    filter: 新加坡|狮城|SG|Singapore|🇸🇬
    include-all-providers: true

proxy-providers:
  tag1:
    type: http
    url: https://sub.xeton.dev/sub?target=clash&list=true&url=ENCODEDURL
    path: tag1.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

rules:
  - RULE-SET,Advertising,REJECT
  - RULE-SET,Proxy,Proxy
  - RULE-SET,ChinaMax,DIRECT
  - RULE-SET,Lan,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,Proxy

rule-providers:
  Lan:
    behavior: classical
    type: http
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Lan/Lan.yaml
    interval: 86400
    path: Lan.yaml

  Advertising:
    behavior: classical
    type: http
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Advertising/Advertising_Classical.yaml
    interval: 86400
    path: Advertising.yaml

  Proxy:
    behavior: classical
    type: http
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Proxy/Proxy_Classical.yaml
    interval: 86400
    path: Proxy.yaml

  ChinaMax:
    behavior: classical
    type: http
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml
    interval: 86400
    path: ChinaMax.yaml
